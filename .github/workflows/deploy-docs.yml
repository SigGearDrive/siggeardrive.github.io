name: Deploy SigGear Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare docs folder
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs

          cp -f *.md docs/ 2>/dev/null || true
          cp -f *.html docs/ 2>/dev/null || true
          cp -f *.txt docs/ 2>/dev/null || true

          cp -R Applications docs/ 2>/dev/null || true
          cp -R Selection-Guides docs/ 2>/dev/null || true
          cp -R Comparisons docs/ 2>/dev/null || true
          cp -R Developers docs/ 2>/dev/null || true
          cp -R assets docs/ 2>/dev/null || true

          echo "Files prepared for MkDocs:"
          ls -la docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --clean

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
