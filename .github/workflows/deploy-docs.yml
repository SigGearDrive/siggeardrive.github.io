name: Deploy SigGear Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material

      - name: Prepare MkDocs source directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs
          mkdir -p docs

          cp -f ./*.md docs/

          for directory in Applications Selection-Guides Comparisons Developers Products assets; do
            if [ -d "$directory" ]; then
              cp -R "$directory" docs/
            fi
          done

          if [ -f robots.txt ]; then
            cp robots.txt docs/robots.txt
          fi

          required_files=(
            "docs/index.md"
            "docs/SG6010C.md"
            "docs/SG6010D.md"
            "docs/SG8021.md"
            "docs/CPM80-25.md"
            "docs/CPM100-25.md"
            "docs/SG78-39.md"
            "docs/Products/index.md"
            "docs/Developers/index.md"
            "docs/Developers/control-support-matrix.md"
          )

          for file in "${required