name: Deploy SigGear Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare docs folder
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs

          cp -f *.md docs/ 2>/dev/null || true
          cp -f *.html docs/ 2>/dev/null || true
          cp -f *.txt docs/ 2>/dev/null || true

          cp -R Applications docs/ 2>/dev/null || true
          cp -R Selection-Guides docs/ 2>/dev/null || true
          cp -R Comparisons docs/ 2>/dev/null || true
          cp -R Developers docs/ 2>/dev/null || true
          cp -R Case-Studies docs/ 2>/dev/null || true
          cp -R Industries docs/ 2>/dev/null || true
          cp -R assets docs/ 2>/dev/null || true
          cp -R images docs/ 2>/dev/null || true

          echo "Files prepared for MkDocs:"
          find docs -maxdepth 2 -type f | sort | head -200

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --clean

      - name: Create sitemap files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import html

          urls = ['https://siggeardrive.github.io/SigGear-product-docs/', 'https://siggeardrive.github.io/SigGear-product-docs/request-cad-sample-quote/', 'https://siggeardrive.github.io/SigGear-product-docs/factory-capability-quality-oem-odm/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/6-42mm-planetary-gear-reducer/', 'https://siggeardrive.github.io/SigGear-product-docs/CPM100-25/', 'https://siggeardrive.github.io/SigGear-product-docs/CPM80-25/', 'https://siggeardrive.github.io/SigGear-product-docs/SG6010C/', 'https://siggeardrive.github.io/SigGear-product-docs/SG8021/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/humanoid-robot-joint-reducer/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/quadruped-robot-joint-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/robot-arm-joint-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/agv-amr-wheel-drive-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/micro-robotics-gear-motor/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/medical-device-micro-gear-motor/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/robot-gripper-gear-motor/', 'https://siggeardrive.github.io/SigGear-product-docs/Applications/servo-motor-planetary-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Selection-Guides/robot-joint-gearbox-selection-guide/', 'https://siggeardrive.github.io/SigGear-product-docs/Selection-Guides/micro-gear-motor-selection-guide/', 'https://siggeardrive.github.io/SigGear-product-docs/Selection-Guides/planetary-gearbox-selection-guide/', 'https://siggeardrive.github.io/SigGear-product-docs/Comparisons/cycloidal-vs-harmonic-drive/', 'https://siggeardrive.github.io/SigGear-product-docs/Comparisons/planetary-vs-cycloidal-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Comparisons/integrated-robot-joint-vs-separate-motor-gearbox/', 'https://siggeardrive.github.io/SigGear-product-docs/Developers/ros2-robot-joint-actuator/', 'https://siggeardrive.github.io/SigGear-product-docs/Developers/can-protocol-robot-joint-control/']

          site_dir = Path("site")
          site_dir.mkdir(exist_ok=True)

          txt = "\n".join(urls) + "\n"
          (site_dir / "sitemap.txt").write_text(txt, encoding="utf-8")

          lines = ['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for url in urls:
              lines.append("  <url>")
              lines.append(f"    <loc>{html.escape(url)}</loc>")
              lines.append("  </url>")
          lines.append("</urlset>")
          (site_dir / "sitemap.xml").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print("Created sitemap files:")
          print((site_dir / "sitemap.txt").read_text(encoding="utf-8"))
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
