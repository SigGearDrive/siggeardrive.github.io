name: Rebuild product image assets

on:
  push:
    branches:
      - hotfix-corrupted-product-images-20260722
    paths:
      - '.image-repair/READY'

permissions:
  contents: write

jobs:
  rebuild-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix-corrupted-product-images-20260722
          fetch-depth: 0

      - name: Decode and verify WebP files
        shell: bash
        run: |
          set -euo pipefail

          rebuild() {
            local source_prefix="$1"
            local target="$2"
            local expected_sha="$3"
            mkdir -p "$(dirname "$target")"
            cat ${source_prefix}.part* | base64 --decode > "$target"
            test "$(sha256sum "$target" | awk '{print $1}')" = "$expected_sha"
            test "$(head -c 4 "$target")" = "RIFF"
            test "$(dd if="$target" bs=1 skip=8 count=4 status=none)" = "WEBP"
            file "$target" | grep -q 'Web/P image'
          }

          rebuild '.image-repair/cpm100-25-with-driver-output-angle.webp.b64' 'docs/assets/images/products/cycloidal-joint-modules/cpm100-25/cpm100-25-with-driver-output-angle.webp' '23e7c5294be6ffa4068a1e75d88b5e7952d4f9717eb26a8a12b2ca5c936991c9'
          rebuild '.image-repair/sg6010d-robot-joint-actuator-front-angle.webp.b64' 'docs/assets/images/products/robot-joint-actuators/sg6010d/sg6010d-robot-joint-actuator-front-angle.webp' 'b46dbffc82fd01a6722187f3903c6c0fed1c1c8eb5496f4bb144c6239ac2fa74'
          rebuild '.image-repair/sg6010d-robot-joint-actuator-interface-view.webp.b64' 'docs/assets/images/products/robot-joint-actuators/sg6010d/sg6010d-robot-joint-actuator-interface-view.webp' '279e743d787069fea659c1433e5bf77834853cfe5ff1f65fd41a16c24ea2c9fb'
          rebuild '.image-repair/sg8021-robot-joint-actuator-exploded-view.webp.b64' 'docs/assets/images/products/robot-joint-actuators/sg8021/sg8021-robot-joint-actuator-exploded-view.webp' 'a98684006decfa5a73262a02e2c05e333c2e7e225cea2ed6a88059f66226adf7'
          rebuild '.image-repair/sg8021-robot-joint-actuator-front-angle.webp.b64' 'docs/assets/images/products/robot-joint-actuators/sg8021/sg8021-robot-joint-actuator-front-angle.webp' 'c750e9900337e96f8dc3d12e8edbc8aa6fabad7641f01af9ac3e95a59ffe8f3a'

          sed -i 's/){ width="900" loading="lazy" }/)/g' docs/products/cycloidal-joint-modules/cpm100-25.md
          sed -i 's/){ width="900" loading="lazy" }/)/g' docs/products/robot-joint-actuators/sg6010d.md
          sed -i 's/){ width="900" loading="lazy" }/)/g' docs/products/robot-joint-actuators/sg8021.md

      - name: Commit repaired image assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .image-repair
          rm -f .github/workflows/rebuild-product-images.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace corrupted product image assets'
          git push origin HEAD:hotfix-corrupted-product-images-20260722
