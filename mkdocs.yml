site_name: "SigGear Product Docs"
site_description: "SigGear precision gearboxes, robot joint actuators, planetary gear reducers, cycloidal joint modules, and compact motion solutions"
site_url: "https://siggeardrive.github.io/"
repo_name: "SigGearDrive/siggeardrive.github.io"
repo_url: "https://github.com/SigGearDrive/siggeardrive.github.io"
docs_dir: "docs"

theme:
  name: "material"
  language: "en"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - codehilite
  - toc:
      permalink: true

nav:
  - "Home": "index.md"
  - "Request CAD / Sample / Quote": "request-cad-sample-quote.md"
  - "Factory Capability": "factory-capability-quality-oem-odm.md"
