      - "Product Documents": "https://github.com/SigGearDrive/SigGear-product-docs"
      - "Robot Joint SDK": "https://github.com/SigGearDrive/SigGear-robot-joint-sdk"
      - "ROS2 Resources": "https://github.com/SigGearDrive/SigGear-ros2"
