site_name: SigGear Product Documentation
site_description: Integrated robot joint actuators, cycloidal reducers, planetary gearboxes and precision gear motors from SigGear.
site_url: https://siggeardrive.github.io/SigGear-product-docs/
repo_url: https://github.com/SigGearDrive/SigGear-product-docs
repo_name: SigGearDrive/SigGear-product-docs

docs_dir: docs

copyright: Copyright &copy; Guangdong SigGear Drive Intelligent Technology Co., Ltd.

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Products:
      - Product Overview: products/index.md
      - Robot Joint Actuators:
          - Series Overview: products/robot-joint-actuators/index.md
          - SG-6010C: products/robot-joint-actuators/sg6010c.md
          - SG-6010D: products/robot-joint-actuators/sg6010d.md
          - SG-8021: products/robot-joint-actuators/sg8021.md
      - Cycloidal Joint Modules:
          - Series Overview: products/cycloidal-joint-modules/index.md
          - CPM-100-25: products/cycloidal-joint-modules/cpm100-25.md
          - CPM-80-25: products/cycloidal-joint-modules/cpm80-25.md
          - CPM-78-39: products/cycloidal-joint-modules/cpm78-39.md
      - Planetary Gearboxes:
          - Series Overview: products/planetary-gearboxes/index.md
          - 6–42 mm Series: products/planetary-gearboxes/6-42mm-planetary-gear-reducer.md
      - Micro Gear Motors: products/micro-gear-motors/index.md
      - Flat BLDC Motors and Joint Drives: products/flat-bldc-motors/index.md
      - Hub Gear Motors:
          - Series Overview: products/hub-gear-motors/index.md
          - SG-2877: products/hub-gear-motors/sg2877.md
          - SG-2878: products/hub-gear-motors/sg2878.md
  - Company:
      - About SigGear: company/about-siggear.md
      - Certifications: company/certifications.md
  - Contact: contact.md
