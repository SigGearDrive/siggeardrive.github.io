      - "Integrated Planetary Robot Joint Actuators":
          - "SG6010C": "SG6010C.md"
          - "SG6010D": "SG6010D.md"
          - "SG8021": "SG8021.md"
      - "Cycloidal Robot Joint Modules":
          - "CPM80-25": "CPM80-25.md"
          - "CPM100-25": "CPM100-25.md"
          - "SG78-39": "SG78-39.md"
      - "Planetary Gear Reducers": "Applications/6-42mm-planetary-gear-reducer.md"
  - "Applications":
      - "Humanoid Robot Joint Reducer": "Applications/humanoid-robot-joint-reducer.md"
      - "Quadruped Robot Joint Gearbox": "Applications/quadruped-robot-joint-gearbox.md"
