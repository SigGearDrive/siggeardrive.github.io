site_name: "SigGear Product Docs"
site_description: "SigGear precision gearboxes, robot joint modules, planetary gear reducers, and compact drive solutions"
site_url: "https://siggeardrive.github.io/SigGear-product-docs/"

repo_name: "SigGearDrive/SigGear-product-docs"
repo_url: "https://github.com/SigGearDrive/SigGear-product-docs"

docs_dir: "docs"

theme:
  name: "material"
  language: "en"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - codehilite
  - toc:
      permalink: true

nav:
  - "Home": "index.md"

  - "Request CAD / Sample / Quote": "request-cad-sample-quote.md"

  - "Factory Capability": "factory-capability-quality-oem-odm.md"

  - "Custom Solutions": "custom-robotic-joint-actuator-oem-gearbox-solutions.md"

  - "Products":
      - "6-42mm Planetary Gear Reducer": "Applications/6-42mm-planetary-gear-reducer.md"
      - "CPM100-25 Compact Cycloidal Robotic Joint Module": "CPM100-25.md"
      - "CPM80-25 Compact Cycloidal Robotic Joint Module": "CPM80-25.md"
      - "SG6010C Compact Precision Drive Solution": "SG6010C.md"
      - "SG8021 Precision Drive Solution": "SG8021.md"

  - "Applications":
      - "Humanoid Robot Joint Reducer": "Applications/humanoid-robot-joint-reducer.md"
      - "Quadruped Robot Joint Gearbox": "Applications/quadruped-robot-joint-gearbox.md"
      - "Robot Arm Joint Gearbox": "Applications/robot-arm-joint-gearbox.md"
      - "AGV AMR Wheel Drive Gearbox": "Applications/agv-amr-wheel-drive-gearbox.md"
      - "6mm Micro Gear Motor for Micro Robotics": "Applications/micro-robotics-gear-motor.md"
      - "Micro Gear Motor for Medical Devices": "Applications/medical-device-micro-gear-motor.md"
      - "Robot Gripper Gear Motor": "Applications/robot-gripper-gear-motor.md"
      - "Servo Motor Planetary Gearbox": "Applications/servo-motor-planetary-gearbox.md"

  - "Selection Guides":
      - "Robot Joint Gearbox Selection Guide": "Selection-Guides/robot-joint-gearbox-selection-guide.md"
      - "Micro Gear Motor Selection Guide": "Selection-Guides/micro-gear-motor-selection-guide.md"
      - "Planetary Gearbox Selection Guide": "Selection-Guides/planetary-gearbox-selection-guide.md"

  - "Comparisons":
      - "Cycloidal Reducer vs Harmonic Drive": "Comparisons/cycloidal-vs-harmonic-drive.md"
      - "Planetary vs Cycloidal Gearbox": "Comparisons/planetary-vs-cycloidal-gearbox.md"
      - "Integrated Robot Joint vs Separate Motor Gearbox": "Comparisons/integrated-robot-joint-vs-separate-motor-gearbox.md"

  - "Developers":
