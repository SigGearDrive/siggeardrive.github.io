site_name: SigGear Product Documentation
site_description: Integrated robot joint actuators, cycloidal reducers, planetary gearboxes and precision gear motors from SigGear.
site_url: https://siggeardrive.github.io/SigGear-product-docs/
repo_url: https://github.com/SigGearDrive/SigGear-product-docs
repo_name: SigGearDrive/SigGear-product-docs

docs_dir: docs

copyright: Copyright &copy; Guangdong SigGear Drive Intelligent Technology Co., Ltd.

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Products:
      - Product Overview: products/index.md
      - Planetary Gearboxes:
          - Series Overview: products/planetary-gearboxes/index.md
          - 8–42 mm Series: products/planetary-gearboxes/8-42mm-planetary-gear-reducer.md
          - 8P (8 mm): products/planetary-gearboxes/8p-planetary-gearbox.md
          - 10P (10 mm): products/planetary-gearboxes/10p-planetary-gearbox.md
          - 12P (12 mm): products/planetary-gearboxes/12p-planetary-gearbox.md
          - 14P (14 mm): products/planetary-gearboxes/14p-planetary-gearbox.md
          - 16P (16 mm): products/planetary-gearboxes/16p-planetary-gearbox.md
          - 20P (20 mm): products/planetary-gearboxes/20p-planetary-gearbox.md
      - Micro Gear Motors: products/micro-gear-motors/index.md
      - Flat BLDC Motors and Joint Drives: products/flat-bldc-motors/index.md
