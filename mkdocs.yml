site_name: SigGear Product Documentation
site_description: Integrated robot joint actuators, cycloidal reducers, planetary gearboxes and precision gear motors from SigGear.
site_url: https://siggeardrive.github.io/SigGear-product-docs/
repo_url: https://github.com/SigGearDrive/SigGear-product-docs
repo_name: SigGearDrive/SigGear-product-docs

docs_dir: docs

copyright: Copyright &copy; Guangdong SigGear Drive Intelligent Technology Co., Ltd.

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

